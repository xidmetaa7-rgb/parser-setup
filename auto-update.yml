name: Auto Update from Smotru TV

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    # Заменили actions/checkout@v4 на его официальный SHA-хэш для безопасности
    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # Заменили actions/setup-node@v4 на его официальный SHA-хэш
    - name: Set up Node.js
      uses: actions/setup-node@39225587ea90c25b9104b821694df52290476db4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm init -y
        npm install puppeteer

    - name: Run parser script
      run: node update.js

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add farid.sadikh.m3u
        git diff-index --quiet HEAD || git commit -m "Автообновление плейлиста [skip ci]"
        git push origin main
